version: '3.9'

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/novacart
      - JWT_SECRET=supersecretkey
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost
      - NODE_ENV=production
      - RAZORPAY_KEY_ID=rzp_test_key_id
      - RAZORPAY_KEY_SECRET=rzp_test_key_secret
      - RAZORPAY_MOCK_MODE=false

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
